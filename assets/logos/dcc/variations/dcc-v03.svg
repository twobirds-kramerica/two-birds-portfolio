<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" rx="180" ry="180" fill="#00897B"/>
  <!-- DCC-V03: Open Book with Screen Glow — "learning meets digital" -->
  <!-- Book spine -->
  <line x1="512" y1="340" x2="512" y2="740" stroke="#FFFFFF" stroke-width="8"/>
  <!-- Left page -->
  <path d="M512 360 Q400 340 260 380 L260 700 Q400 660 512 680" fill="none" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right page -->
  <path d="M512 360 Q624 340 764 380 L764 700 Q624 660 512 680" fill="none" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Screen glow above book -->
  <circle cx="512" cy="260" r="50" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="512" cy="260" r="28" fill="#FFFFFF" opacity="0.5"/>
</svg>
