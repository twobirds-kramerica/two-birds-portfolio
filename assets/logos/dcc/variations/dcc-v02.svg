<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" rx="180" ry="180" fill="#00897B"/>
  <!-- DCC-V02: Sunrise — "new day, growth, confidence rising" -->
  <!-- Horizon line -->
  <line x1="200" y1="560" x2="824" y2="560" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round"/>
  <!-- Rising sun (half circle) -->
  <path d="M320 560 A192 192 0 0 1 704 560" fill="none" stroke="#FFFFFF" stroke-width="44" stroke-linecap="round"/>
  <!-- Rays -->
  <line x1="512" y1="300" x2="512" y2="220" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round"/>
  <line x1="380" y1="340" x2="340" y2="280" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round"/>
  <line x1="644" y1="340" x2="684" y2="280" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round"/>
  <!-- Ground dots suggesting digital/stepping stones -->
  <circle cx="340" cy="680" r="24" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="460" cy="720" r="20" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="564" cy="700" r="22" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="684" cy="740" r="18" fill="#FFFFFF" opacity="0.45"/>
</svg>
