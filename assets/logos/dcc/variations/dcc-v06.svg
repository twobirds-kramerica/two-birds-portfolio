  <path d="M340 300 Q380 300 400 340 L440 440 Q460 480 420 500 L340 520" fill="none" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lower hand (reaching up) -->
  <path d="M684 724 Q644 724 624 684 L584 584 Q564 544 604 524 L684 504" fill="none" stroke="#FFFFFF" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Connection spark between hands -->
  <circle cx="512" cy="512" r="20" fill="#FFFFFF"/>
  <circle cx="512" cy="512" r="40" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.5"/>
  <circle cx="512" cy="512" r="65" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.3"/>
</svg>
