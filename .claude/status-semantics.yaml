# SSOT: Notion Status Values for HAL Stack automation.
# All automation scripts read this file — do not hardcode status strings.
# Updated: 2026-05-08

version: "1.0"
schema_updated: "2026-05-08"

# The status next-sprint.py locks on (only this status is auto-picked)
auto_pick_status: "Ready"

# The status next-sprint.py sets when a sprint is locked
in_progress_status: "In Progress"

# Statuses that mean "this sprint is finished" (excluded from open queries)
done_statuses: ["Done", "Archived"]

# Full status vocabulary (for reference — must match Notion select options)
# Backlog     — not yet prioritised for execution
# Ready       — approved, next in line (AUTO-PICK)
# In Progress — currently executing
# Blocked     — waiting on a human action
# Review      — done but under review
# Done        — completed, outputs linked
# Archived    — historical record only
