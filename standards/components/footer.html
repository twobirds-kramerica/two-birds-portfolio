<!--
  Component: Footer
  Tokens: tokens.css required
  Variants: TBI (blue border) | DCC (teal border) — set --footer-brand
  Tailwind equiv: border-t-2 py-8 px-6 text-center text-sm
-->

<style>
.tb-footer {
  border-top: 3px solid var(--footer-brand, var(--tbi-blue, #0066CC));
  padding: var(--space-10, 40px) var(--space-6, 24px);
  text-align: center;
  font-family: var(--font-sans);
  background: var(--bg-card, #FFFFFF);
}

.tb-footer-links {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: var(--space-2, 8px) var(--space-6, 24px);
  list-style: none;
  margin: 0 0 var(--space-4, 16px);
  padding: 0;
}

.tb-footer-links a {
  color: var(--text-secondary, #5D6D7E);
  text-decoration: none;
  font-size: var(--text-sm, 0.875rem);
  transition: color var(--duration-fast) var(--ease-default);
}

.tb-footer-links a:hover {
  color: var(--text-primary, #333333);
  text-decoration: underline;
}

.tb-footer-copyright {
  color: var(--text-muted, #5A6B78);
  font-size: var(--text-sm, 0.875rem);
  margin: 0;
}
</style>

<footer class="tb-footer">
  <ul class="tb-footer-links">
    <li><a href="/about">About</a></li>
    <li><a href="/privacy">Privacy</a></li>
    <li><a href="/terms">Terms</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
  <p class="tb-footer-copyright">
    &copy; 2026 Two Birds Innovation. St. Thomas, Ontario, Canada.
  </p>
</footer>
